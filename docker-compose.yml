services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: betalpha
    ports:
      - "5432:5432"
    volumes:
      - betalpha_pg:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      BETALPHA_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/betalpha
      BETALPHA_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  betalpha_pg:
